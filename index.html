<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfólio | Designer Gráfico</title>
  <style>
    :root {
      --bg: #0b0d12;
      --card: #121722;
      --card-2: #171d2a;
      --text: #f5f7fb;
      --muted: #a8b0c0;
      --line: rgba(255,255,255,0.08);
      --accent: #ff6a00;
      --accent-2: #ff9f43;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius: 22px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255,106,0,0.18), transparent 25%),
        radial-gradient(circle at left center, rgba(255,159,67,0.10), transparent 22%),
        var(--bg);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: rgba(11, 13, 18, 0.72);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 16px;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .brand span { color: var(--accent); }

    .menu {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .menu a:hover { color: var(--text); }

    .hero {
      padding: 72px 0 42px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: center;
    }

    .hero-card, .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .hero-card {
      padding: 42px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,106,0,0.28);
      background: rgba(255,106,0,0.12);
      color: #ffd3ad;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.86rem;
      margin-bottom: 18px;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-size: clamp(2.2rem, 4vw, 4.6rem);
      line-height: 1.05;
      margin-bottom: 16px;
      letter-spacing: -1.8px;
    }

    .lead {
      font-size: 1.08rem;
      color: var(--muted);
      max-width: 58ch;
      margin-bottom: 26px;
    }

    .cta-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      font-weight: 700;
      border: 1px solid var(--line);
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #ff9f43);
      border-color: transparent;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.03);
      color: var(--text);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .mini-info {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .profile-card {
      padding: 22px;
    }

    .profile-box {
      background: linear-gradient(180deg, rgba(255,106,0,0.18), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      overflow: hidden;
    }

    .profile-photo {
      aspect-ratio: 4 / 4.5;
      background:
        linear-gradient(rgba(11,13,18,0.18), rgba(11,13,18,0.25)),
        url('images/perfil.jpg?v=2') center/cover no-repeat,
        linear-gradient(135deg, #2a3142, #151a24);
    }

    .profile-content {
      padding: 22px;
    }

    .role {
      color: var(--accent-2);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .profile-content p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .section {
      padding: 28px 0 10px;
    }

    .section-title {
      font-size: clamp(1.6rem, 2vw, 2.4rem);
      margin-bottom: 8px;
      letter-spacing: -0.8px;
    }

    .about-grid, .resume-grid, .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .card {
      padding: 26px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .stat {
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .tag {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      font-size: 0.92rem;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .project {
      overflow: hidden;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      transition: 0.2s ease;
    }

    .project:hover {
      transform: translateY(-4px);
    }

    .project-image {
      aspect-ratio: 16 / 11;
      background-size: cover;
      background-position: center;
    }

    .project-content {
      padding: 18px;
    }

    .project-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .timeline {
      display: grid;
      gap: 16px;
    }

    .timeline-item {
      border-left: 2px solid rgba(255,106,0,0.35);
      padding-left: 16px;
    }

    .contact-list {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .contact-item {
      padding: 16px;
      border-radius: 16px;
      background: var(--card-2);
      border: 1px solid var(--line);
      word-break: break-word;
    }

    footer {
      padding: 30px 0 50px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 960px) {
      .hero-grid,
      .about-grid,
      .resume-grid,
      .contact-grid,
      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
